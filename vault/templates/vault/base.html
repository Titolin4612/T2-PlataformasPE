{% load static %} #base.html es la plantilla base para todas las páginas de la aplicación vault. define la estructura HTML común.
<!DOCTYPE html> 
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Command Vault{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        surface: '#0f172a',
                        surface2: '#111827',
                        surface3: '#1e293b'
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="{% static 'vault/app.css' %}">
</head>
<body class="vault-app min-h-screen bg-slate-950 text-slate-100 antialiased">

<div class="vault-ambient" aria-hidden="true">
    <span class="vault-ambient-glow vault-ambient-glow--one"></span>
    <span class="vault-ambient-glow vault-ambient-glow--two"></span>
</div>

<header class="vault-topbar">
    <div class="vault-shell vault-topbar-inner">
        <a class="vault-brand" href="{% url 'snippet_list' %}">
            <span class="vault-brand-mark">CV</span>
            <span class="vault-brand-copy">
                <span class="vault-brand-kicker">Developer vault</span>
                <span class="vault-brand-title">Command Vault</span>
            </span>
        </a>

        <div class="vault-topbar-actions">
            <a href="{% url 'snippet_create' %}" class="vault-create-btn">Nuevo snippet</a>
        </div>
    </div>
</header>

<main class="vault-shell vault-main">
    {% block content %}{% endblock %}
</main>

<script>
    (function () {
        function setCopiedState(button) {
            button.classList.add("is-copied");
            clearTimeout(button._copyTimer);
            button._copyTimer = setTimeout(function () {
                button.classList.remove("is-copied");
            }, 1600);
        }

        async function copyText(text) {
            if (navigator.clipboard && window.isSecureContext) {
                await navigator.clipboard.writeText(text);
                return true;
            }

            var temp = document.createElement("textarea");
            temp.value = text;
            temp.style.position = "fixed";
            temp.style.opacity = "0";
            document.body.appendChild(temp);
            temp.focus();
            temp.select();
            var ok = document.execCommand("copy");
            document.body.removeChild(temp);
            return ok;
        }

        document.addEventListener("click", async function (event) {
            var button = event.target.closest("[data-copy-btn]");
            if (!button) return;

            var codeWrap = button.closest(".snippet-code, .vault-code-panel");
            if (!codeWrap) return;

            var codeEl = codeWrap.querySelector("code");
            if (!codeEl) return;

            var text = codeEl.textContent || "";
            if (!text.trim()) return;

            try {
                await copyText(text);
                setCopiedState(button);
            } catch (error) {
                console.error("No se pudo copiar el snippet:", error);
            }
        });
    })();
</script>

</body>
</html>
