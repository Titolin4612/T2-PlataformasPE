{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Command Vault{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Space Grotesk', 'system-ui', 'sans-serif'],
                        mono: ['JetBrains Mono', 'ui-monospace', 'monospace'],
                    },
                    boxShadow: {
                        glow: '0 30px 80px rgba(8, 47, 73, 0.32)',
                    },
                },
            },
        };
    </script>
</head>
<body class="min-h-screen bg-slate-950 font-sans text-slate-100 antialiased">
<div class="fixed inset-0 -z-10 overflow-hidden">
    <div class="absolute inset-0 bg-[radial-gradient(circle_at_top_left,_rgba(34,211,238,0.18),_transparent_26%),radial-gradient(circle_at_top_right,_rgba(14,165,233,0.14),_transparent_24%),linear-gradient(180deg,_#06101d_0%,_#020617_100%)]"></div>
    <div class="absolute inset-0 bg-[linear-gradient(rgba(148,163,184,0.06)_1px,transparent_1px),linear-gradient(90deg,rgba(148,163,184,0.06)_1px,transparent_1px)] bg-[size:34px_34px] [mask-image:radial-gradient(circle_at_center,black_40%,transparent_88%)]"></div>
</div>

<div class="relative mx-auto flex min-h-screen w-full max-w-7xl flex-col px-4 pb-8 pt-4 sm:px-6 lg:px-8">
    <header class="sticky top-0 z-30 py-3">
        <div class="flex items-center justify-between gap-4 rounded-[28px] border border-white/10 bg-slate-950/75 px-5 py-4 shadow-glow backdrop-blur-xl">
            <a class="flex min-w-0 items-center gap-4" href="{% url 'snippet_list' %}">
                <span class="flex h-12 w-12 shrink-0 items-center justify-center rounded-2xl border border-cyan-400/25 bg-cyan-400/10 font-mono text-sm font-bold tracking-[0.18em] text-cyan-100">CV</span>
                <span class="flex min-w-0 flex-col">
                    <span class="text-[0.68rem] font-bold uppercase tracking-[0.32em] text-cyan-300">Biblioteca personal</span>
                    <span class="truncate text-lg font-semibold tracking-[-0.03em] text-white">Command Vault</span>
                </span>
            </a>

            <div class="flex items-center gap-3">
                <a href="{% url 'snippet_create' %}" class="inline-flex items-center justify-center rounded-full border border-cyan-300/20 bg-gradient-to-r from-cyan-300 to-sky-400 px-5 py-3 text-sm font-bold text-slate-950 transition hover:-translate-y-0.5 hover:shadow-[0_16px_40px_rgba(14,165,233,0.28)]">
                    Nuevo snippet
                </a>
            </div>
        </div>
    </header>

    <main class="flex-1 py-6">
        {% block content %}{% endblock %}
    </main>
</div>

<script src="{% static 'vault/app.js' %}" defer></script>
</body>
</html>
