<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Command Vault{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        surface: '#0f172a',
                        surface2: '#111827',
                        surface3: '#1e293b'
                    }
                }
            }
        }
    </script>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100">

<nav class="sticky top-0 z-20 border-b border-slate-800 bg-slate-900/95 backdrop-blur">
    <div class="mx-auto flex max-w-6xl items-center justify-between px-4 py-4">
        <a class="text-lg font-semibold tracking-tight text-white sm:text-xl" href="{% url 'snippet_list' %}">Command Vault</a>
        <a href="{% url 'snippet_create' %}" class="inline-flex items-center rounded-2xl bg-indigo-500 px-4 py-2 text-sm font-semibold text-white shadow-lg shadow-indigo-500/20 transition duration-200 ease-out hover:bg-indigo-400 focus:outline-none focus:ring-2 focus:ring-indigo-500/50">Nuevo snippet</a>
    </div>
</nav>

<main class="mx-auto max-w-6xl px-4 py-8 sm:px-6 lg:px-8">
    {% block content %}{% endblock %}
</main>

</body>
</html>
