{% extends 'vault/base.html' %}

{% block title %}{{ titulo_pagina }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card bg-black text-light border-secondary shadow">
            <div class="card-body p-4">
                <h1 class="fw-bold mb-4">{{ titulo_pagina }}</h1>

                <form method="post">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label">Título</label>
                        {{ form.titulo }}
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Lenguaje</label>
                            {{ form.lenguaje }}
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Categoría</label>
                            {{ form.categoria }}
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Descripción</label>
                        {{ form.descripcion }}
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Código</label>
                        {{ form.codigo }}
                    </div>

                    <div class="form-check mb-4">
                        {{ form.destacado }}
                        <label class="form-check-label ms-2">Marcar como destacado</label>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">{{ texto_boton }}</button>
                        <a href="{% url 'snippet_list' %}" class="btn btn-outline-light">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
