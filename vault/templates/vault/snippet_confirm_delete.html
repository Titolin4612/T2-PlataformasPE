{% extends 'vault/base.html' %}

{% block title %}Eliminar snippet{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card bg-black text-light border-danger shadow">
            <div class="card-body p-4">
                <h1 class="fw-bold text-danger mb-3">Eliminar snippet</h1>
                <p>¿Seguro que deseas eliminar <strong>{{ snippet.titulo }}</strong>?</p>
                <p class="text-secondary">Esta acción no se puede deshacer.</p>

                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-danger">Sí, eliminar</button>
                        <a href="{% url 'snippet_detail' snippet.pk %}" class="btn btn-outline-light">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
