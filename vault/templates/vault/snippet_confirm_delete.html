{% extends 'vault/base.html' %}

{% block title %}Eliminar snippet{% endblock %}

{% block content %}
<div class="mx-auto max-w-2xl rounded-3xl border border-slate-800 bg-slate-900/95 p-6 shadow-xl shadow-slate-950/20 sm:p-8">
    <div class="space-y-5">
        <div>
            <h1 class="text-3xl font-semibold text-white">Eliminar snippet</h1>
            <p class="mt-3 text-slate-400">¿Seguro que deseas eliminar <strong class="text-white">{{ snippet.titulo }}</strong>?</p>
            <p class="text-slate-500">Esta acción no se puede deshacer.</p>
        </div>

        <form method="post" class="flex flex-wrap gap-3">
            {% csrf_token %}
            <button type="submit" class="inline-flex items-center justify-center rounded-2xl bg-rose-500 px-6 py-3 text-sm font-semibold text-white shadow-lg shadow-rose-500/20 transition duration-200 hover:bg-rose-400 focus:outline-none focus:ring-2 focus:ring-rose-500/50">Sí, eliminar</button>
            <a href="{% url 'snippet_detail' snippet.pk %}" class="inline-flex items-center justify-center rounded-2xl border border-slate-700 bg-slate-900/80 px-6 py-3 text-sm font-semibold text-slate-200 transition duration-200 hover:border-indigo-500 hover:text-white">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
